<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <!-- <meta http-equiv="X-UA-Compatible" content="IE-edge"> -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="src/style.css" />
        <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
        <title>AI Ukrainian poem generatar</title>
    </head>

    <body>
        <div class="container">
            <header>
            <h1> AI Ukrainian poem generator</h1>
            </header>

            <main>
                <form id="poem-generator-form">
                    <input type="text"
                    placeholder="Enter the topic of the Ukrainian poem " 
                    autofocus
                    required
                    autocomplete="off"
                    class="instruction"
                    id = "user-instructions"/>
                    <input type="submit" class="submit-button"/>
                </form> 


                <div class="poem" id="poem"></div>
            </main>

            <footer> 
                This AI Project was coded by <a href="https://github.com/Kristina2509" target="_blank"> Kristina Tymoshenko </a> and is 
                <a href="https://github.com/Kristina2509/ukrainian-poems-generator" target="_blank"> open-sourced on GitHub </a>
                and is
                <a href="https://ai-ukrainian-poem-generator.netlify.app" target="_blank">hosted on Netlify.</a>
            </footer>
         </div>
        <script src="src/index.js"></script>
    </body>

</html>
